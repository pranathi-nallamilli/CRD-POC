name: Java CI/CD Pipeline (Signed Images)

on:
  push:
    branches: [ main ]
    # No paths-ignore needed! Pipeline never touches manifests.
  pull_request:
    branches: [ main ]

permissions:
  contents: read       # Read only! No write access needed.
  id-token: write      # For Cosign OIDC (optional keyless mode)

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/java-demo-app

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean test
      - run: mvn clean package -DskipTests
      - uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

  # Job 2: Build, Push, Scan, and Sign
  docker-build-sign:
    name: Build, Push & Sign Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest

      - name: Build and Push
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      # Cosign signing
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:main-${SHORT_SHA}"
          
          # Sign the image
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes "${IMAGE}"
          
          echo "✅ Image signed: ${IMAGE}"
          
          # Also sign latest tag
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            "${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE }}:latest"
          
          echo "✅ Latest tag signed"

      # No Job 3 (manifest update) - Image Updater handles it
      # No Job 4 (notify) - ArgoCD handles deployment
