name: Review Board CI Integration

# Trigger on pull requests (which correspond to review requests)
on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write
  statuses: write

env:
  REVIEWBOARD_URL: "http://localhost:8083"

jobs:
  # Job 1: Run tests and report to Review Board
  review-checks:
    name: Review Board - Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run tests
        id: tests
        run: |
          if mvn clean test; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "message=All tests passed" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "message=Tests failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Code style check
        id: style
        run: |
          # Basic code style check - no trailing whitespace, consistent indentation
          ISSUES=$(find src -name "*.java" -exec grep -l "	" {} \; | wc -l | tr -d ' ')
          if [ "$ISSUES" -gt "0" ]; then
            echo "result=warning" >> $GITHUB_OUTPUT
            echo "message=Found $ISSUES files with tab characters" >> $GITHUB_OUTPUT
          else
            echo "result=success" >> $GITHUB_OUTPUT
            echo "message=Code style looks good" >> $GITHUB_OUTPUT
          fi

      - name: Post review summary as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const testResult = '${{ steps.tests.outputs.result }}';
            const testMessage = '${{ steps.tests.outputs.message }}';
            const styleResult = '${{ steps.style.outputs.result }}';
            const styleMessage = '${{ steps.style.outputs.message }}';
            
            const testIcon = testResult === 'success' ? '✅' : '❌';
            const styleIcon = styleResult === 'success' ? '✅' : '⚠️';
            
            const body = `## Review Board CI Check Results\n\n` +
              `| Check | Status | Details |\n` +
              `|-------|--------|---------|\n` +
              `| Unit Tests | ${testIcon} ${testResult} | ${testMessage} |\n` +
              `| Code Style | ${styleIcon} ${styleResult} | ${styleMessage} |\n\n` +
              `> These checks ran automatically when code was submitted for review.\n` +
              `> Review Board integration: Results should be verified before "Ship It!" approval.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
