name: Java CI/CD Pipeline with ArgoCD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'k8s/deployment.yaml'  # Don't trigger on deployment updates
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  # Docker image configuration
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/java-demo-app
  
  # Git configuration for K8s manifest updates
  K8S_MANIFEST_REPO: pranathi-nallamilli/CRD-POC
  K8S_MANIFEST_PATH: k8s/deployment.yaml

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build and Test Java Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run tests with Maven
        run: mvn clean test
      
      - name: Build JAR with Maven
        run: mvn clean package -DskipTests
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app-jar
          path: target/*.jar
          retention-days: 7

  # Job 2: Build and Push Docker Image
  build-and-push-image:
    name: Build and Push Docker Image 
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build-push.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-,format=short
            type=raw,value=latest
      
      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
      
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # Job 3: Update Kubernetes Manifests (GitOps)
  update-k8s-manifest:
    name: Update Kubernetes Manifest
    runs-on: ubuntu-latest
    needs: build-and-push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}
      
      - name: Update image tag in deployment manifest
        run: |
          # Extract the new image with SHORT SHA tag (matching Docker Hub tag format)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_IMAGE="${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/java-demo-app:main-${SHORT_SHA}"
          
          echo "Updating deployment.yaml with new image: ${NEW_IMAGE}"
          
          # Update the deployment.yaml with new image
          sed -i "s|image:.*java-demo-app.*|image: ${NEW_IMAGE}|g" ${{ env.K8S_MANIFEST_PATH }}
          
          # Show the changes
          echo "Updated manifest:"
          cat ${{ env.K8S_MANIFEST_PATH }}
      
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add ${{ env.K8S_MANIFEST_PATH }}
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            git commit -m "Update java-demo-app image to main-${SHORT_SHA}"
            git push origin main
          fi
      
      - name: Comment on commit with deployment info
        uses: actions/github-script@v7
        with:
          script: |
            const shortSha = '${{ github.sha }}'.substring(0, 7);
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Docker image built and pushed successfully!\n\n**Image:** \`${{ env.DOCKER_REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/java-demo-app:main-${shortSha}\`\n\nArgoCD will deploy this to Kubernetes cluster automatically.`
            })

  # Job 4: Notify on completion
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-test, build-and-push-image, update-k8s-manifest]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Create GitHub Deployment Status
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ needs.update-k8s-manifest.result }}' === 'success' ? 'success' : 'failure';
            
            core.notice(`✅ CI/CD Pipeline completed with status: ${status}`);
            core.notice(`📦 Image pushed to Docker Hub`);
            core.notice(`📝 Kubernetes manifest updated in Git`);
            core.notice(`🔄 ArgoCD will sync automatically`);
