apiVersion: v1
kind: Service
metadata:
  name: java-demo-app
  namespace: default
  labels:
    app: java-demo-app
spec:
  type: ClusterIP
  selector:
    app: java-demo-app
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: http  # References the container port name
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: java-demo-app-headless
  namespace: default
  labels:
    app: java-demo-app
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: java-demo-app
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: http
